syntax = "proto3";

package communication.petsvote.vote;

option go_package = "github.com/megauspexx/petsvote.last-proto/go;advicepb";

import "validate/validate.proto";

// Запрос на установку реферального кода
message SetReferralRequest {
  // ID пользователя
  int64 user_id = 1 [(validate.rules).int64.gt = 0];
  // Реферальный код
  string referral_code = 2 [(validate.rules).string = {
    min_len: 1,
    max_len: 50
  }];
  // ID питомца
  int64 pet_id = 3 [(validate.rules).int64.gt = 0];
}